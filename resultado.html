<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Resultado - Modelo OSI</title>

  <style>
    .resultado-wrapper {
      padding: 3rem;
      color: #e3e0b3;
    }

    .resultado-wrapper h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #ff5722;
    }

    .resultado-wrapper h3 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: #ffb300;
      margin-top: 2rem;
    }

    .token-box {
      background-color: #1a1a1a;
      border: 1px solid #ff5722;
      border-radius: 0.5rem;
      padding: 1.5rem;
      word-break: break-all;
      font-family: monospace;
      font-size: 1.1rem;
      color: #e91e63;
      margin-bottom: 1.5rem;
    }

    .payload-box {
      background-color: #1a1a1a;
      border: 1px solid #ffb300;
      border-radius: 0.5rem;
      padding: 1.5rem;
      font-family: monospace;
      font-size: 1.1rem;
      color: #e3e0b3;
      white-space: pre-wrap;
      margin-bottom: 1.5rem;
    }

    .voltar-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2rem;
      background-color: #ff5722;
      color: #FFF;
      border: none;
      border-radius: 0.5rem;
      font-family: "Poppins", sans-serif;
      font-size: 1.2rem;
      cursor: pointer;
      text-decoration: none;
    }

    .voltar-btn:hover {
      background-color: #e64a19;
    }

    .camada-label {
      display: inline-block;
      background-color: #e91e63;
      color: #FFF;
      font-size: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 0.3rem;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.png" alt="">
    <p class="title">Trabalho de Redes - Padrão OSI</p>
    <p class="user"></p>
  </header>
  <main class="main">
    <div class="resultado-wrapper">
      <h2>Saída da Chamada</h2>

      <span class="camada-label">Camada de Aplicação — Payload Original</span>
      <h3>Informações da Chamada</h3>
      <pre class="payload-box" id="payload-display">Carregando...</pre>

      <span class="camada-label">Camada de Apresentação — Criptografia JWT</span>
      <h3>Token JWT Gerado</h3>
      <div class="token-box" id="token-display">Carregando...</div>

      <span class="camada-label">Camada de Sessão — Controle de Conexão</span>
      <h3>Dados da Sessão</h3>
      <pre class="payload-box" id="sessao-display">Carregando...</pre>

      <br>
      <a href="./index.html" class="voltar-btn">← Voltar</a>
    </div>
  </main>

  <script type="module" src="./scripts/resultado.js"></script>
</body>

</html>
