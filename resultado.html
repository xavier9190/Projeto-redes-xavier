<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="./style/resultado.css">

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <title>Resultado — Modelo OSI | Pedro Xavier</title>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.webp" alt="OSI Model">
    <p class="title">Trabalho de Redes — Modelo OSI</p>
    <div class="header-right">
      <div class="user-wrapper">
        <p class="user" id="userNameDisplay">—</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <div class="status-led"></div>
      </div>
    </div>
  </header>

  <main class="main resultado-main">

    <div class="resultado-wrapper">
      <h2>📡 Simulação Completa do Modelo OSI</h2>
      <p style="color:var(--text-dim);margin-bottom:1.5rem;font-size:0.9rem;">Dados processados pelas 7 camadas</p>

      <!-- Container dinâmico para todas as camadas -->
      <div id="dados-conteudo" class="dados-box"></div>

      <!-- Canvas da Camada de Rede — posicionado pelo JS -->
      <canvas id="networkCanvas" width="900" height="500"
        style="background-color:#0d1b2e;border:1px solid var(--primary);border-radius:0.5rem;
               margin-top:1rem;margin-bottom:1rem;width:100%;display:none;"></canvas>

      <!-- Div para info de rota textual (compatibilidade) -->
      <div id="rede-info"></div>

      <a href="./index.html" class="voltar-btn">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </a>
    </div>

  </main>

  <script type="module" src="./scripts/resultado.js"></script>
</body>

</html>
