<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Modelo OSI</title>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.png" alt="">
    <p class="title">Trabalho de Redes - Padrão OSI</p>
    <p class="user"></p>
  </header>
  <main class="main">
    <div class="request-wrapper">
      <input class="text-input" type="text" id="text-input" placeholder="Insira seu texto, www.exemplo.com.br ou contato@..." style="margin-right: 1rem;">
      <input type="file" name="file" id="arquivo" style="margin-right: 1rem;">
      
      <button class="request-btn">Executar Chamada</button>
    </div>

    <!-- Campos adicionais de E-mail (aparecem automaticamente quando "@" é detectado) -->
    <div id="email-form" style="display: none; padding: 2rem 3rem;">
      <div style="display: flex; gap: 1.5rem; margin-bottom: 1rem;">
        <input class="text-input" type="text" id="email-assunto" placeholder="Título do E-mail" style="flex: 1;">
        <textarea class="text-input" id="email-corpo" placeholder="Escreva o conteúdo principal aqui..." style="flex: 1; height: 6rem; resize: vertical; padding: 0.5rem;"></textarea>
      </div>
    </div>

    <div class="protocol-name-wrapper">
      <h1 class="protocol-name"></h1>
    </div>
  </main>
  
  <script type="module" src="./scripts/application.js"></script>
  <script type="module" src="./scripts/OSI.js"></script>
</body>

</html>
