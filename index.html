<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <title>Modelo OSI — Pedro Xavier</title>
</head>

<body>
  <header class="head">
    <img class="osi-img" src="./assets/osi-icon.webp" alt="OSI Model">
    <p class="title">Trabalho de Redes — Modelo OSI</p>
    <div class="header-right">
      <div class="user-wrapper">
        <p class="user" id="userNameDisplay">Carregando...</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <div class="status-led"></div>
        <button id="btn-logout" class="logout-btn">Trocar Usuário</button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Linha de entrada -->
    <div class="request-wrapper">
      <div class="input-group">
        <label>URL / E-mail / Mensagem:</label>
        <div class="input-container">
          <input type="text" id="text-input" class="text-input"
            placeholder="Digite a mensagem, www.site.com ou email@...">
          <button class="request-btn">
            <i class="fa-solid fa-play"></i> Realizar Requisição
          </button>
        </div>
      </div>

      <div class="file-upload-wrapper">
        <label for="arquivo" class="custom-file-upload">
          <i class="fa-solid fa-paperclip"></i> Anexar Arquivo
          <input type="file" id="arquivo">
        </label>
      </div>
    </div>

    <!-- Protocolo detectado -->
    <div class="protocol-name-wrapper">
      <p class="protocol-name"></p>
    </div>

    <!-- ===== FORMULÁRIO DE E-MAIL (SMTP) ===== -->
    <form class="email-form hidden osi-form">
      <p class="form-title">📧 Simulador de Envio — SMTP</p>

      <div class="form-group">
        <label for="remetente">Remetente:</label>
        <input type="email" id="remetente" class="input-field" placeholder="exemplo@email.com" required>
      </div>

      <div class="form-group">
        <label for="destinatario">Destinatário:</label>
        <input type="email" id="destinatario" class="input-field" placeholder="destino@email.com" required>
      </div>

      <div class="form-group">
        <label for="assunto">Assunto:</label>
        <input type="text" id="assunto" class="input-field" placeholder="Assunto do e-mail" required>
      </div>

      <div class="form-group">
        <label for="corpo">Corpo da Mensagem:</label>
        <textarea id="corpo" class="input-field textarea-field" placeholder="Digite sua mensagem..." required></textarea>
      </div>

      <button type="submit" class="request-btn">
        <i class="fa-solid fa-paper-plane"></i> Enviar E-mail
      </button>
    </form>

    <!-- ===== FORMULÁRIO DE CHAT (WebSocket) ===== -->
    <form class="chat-form hidden osi-form">
      <p class="form-title">💬 Simulador de Chat — WebSocket</p>

      <div class="form-group">
        <label for="chat-destinatario">Destinatário:</label>
        <input type="text" id="chat-destinatario" class="input-field" placeholder="Nome do amigo ou grupo..." required>
      </div>

      <div class="form-group">
        <label for="chat-mensagem">Mensagem:</label>
        <textarea id="chat-mensagem" class="input-field textarea-field" placeholder="Digite a mensagem..." required></textarea>
      </div>

      <button type="submit" class="request-btn">
        <i class="fa-solid fa-comments"></i> Enviar Mensagem
      </button>
    </form>

    <!-- ===== FORMULÁRIO WEB (HTTP/HTTPS) ===== -->
    <form class="site-form hidden osi-form">
      <p class="form-title">🌐 Simulador de Requisição Web — HTTP/HTTPS</p>

      <div class="form-group">
        <label for="site-metodo">Método HTTP:</label>
        <select id="site-metodo" class="input-field">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
        </select>
      </div>

      <div class="form-group">
        <label for="site-host">Host / URL Detectado:</label>
        <input type="text" id="site-host" class="input-field" readonly>
      </div>

      <button type="submit" class="request-btn">
        <i class="fa-solid fa-globe"></i> Enviar Requisição HTTP
      </button>
    </form>

  </main>

  <script type="module" src="./scripts/OSI.js"></script>
</body>

</html>
